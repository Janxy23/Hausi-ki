<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-STUDY AI | v2.5</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://jsdelivr.net"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #02040a; color: #e2e8f0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .cyber-header { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .glass { background: rgba(10, 15, 30, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(59, 130, 246, 0.2); }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .ai-bubble { border-left: 4px solid #3b82f6; box-shadow: -5px 5px 20px rgba(0,0,0,0.4); }
        .btn-glow:hover { box-shadow: 0 0 15px rgba(59, 130, 246, 0.6); transform: scale(1.02); }
    </style>
</head>
<body>

    <!-- Header -->
    <nav class="p-4 glass flex justify-between items-center z-50 border-b border-blue-500/20">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white shadow-[0_0_20px_rgba(59,130,246,0.4)]">Σ</div>
            <h1 class="cyber-header font-bold text-lg tracking-widest text-blue-500">STUDY<span class="text-white">AI</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="status-tag" class="px-3 py-1 rounded bg-red-500/10 text-red-500 border border-red-500/20 text-[10px] font-black uppercase tracking-tighter">Ads Active</div>
        </div>
    </nav>

    <!-- Chat Verlauf -->
    <div id="chat-container" class="chat-area flex-1 overflow-y-auto p-6 space-y-6 pb-48">
        <div class="flex justify-start">
            <div class="glass p-5 rounded-2xl rounded-tl-none max-w-[85%] ai-bubble">
                <p class="text-sm leading-relaxed">System-Protokoll bereit. <br><br>
                🚀 <b>PowerPoint:</b> Schreib "Referat über [Thema]".<br>
                🔓 <b>Premium:</b> Klick unten 3x auf Teilen (kein Warten).</p>
            </div>
        </div>
    </div>

    <!-- Input Bereich -->
    <div class="fixed bottom-[110px] left-0 right-0 p-4 z-40 bg-gradient-to-t from-[#02040a] via-[#02040a] to-transparent">
        <div class="max-w-4xl mx-auto glass rounded-2xl p-2 border border-blue-500/30">
            <div class="flex items-center gap-3">
                <label class="w-12 h-12 flex items-center justify-center bg-blue-600/10 rounded-xl cursor-pointer hover:bg-blue-600/20 transition border border-blue-500/20">
                    <span id="clip-icon" class="text-2xl text-blue-500">+</span>
                    <input type="file" id="img-in" class="hidden" accept="image/*" onchange="previewImg()">
                </label>
                <input type="text" id="user-msg" placeholder="Wartezeit: 30s..." disabled 
                    class="flex-1 bg-transparent border-none px-2 py-3 outline-none text-sm placeholder:text-gray-600 font-medium">
                <button id="send-btn" onclick="handleAction()" disabled 
                    class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center disabled:opacity-20 transition btn-glow">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                </button>
            </div>
            <div class="flex justify-between items-center mt-2 px-2">
                <button onclick="shareForPremium()" class="text-[10px] text-blue-400 font-bold hover:text-blue-300">🔗 LINK TEILEN (<span id="share-val">0</span>/3)</button>
                <p id="timer-text" class="text-[8px] text-gray-500 font-bold uppercase tracking-[0.3em]">Locked: 30s</p>
            </div>
        </div>
    </div>

    <!-- DEIN ORIGINAL A-ADS CODE -->
    <div style="position: absolute; z-index: 99999">
      <input autocomplete="off" type="checkbox" id="aadsstickymojbiylo" hidden />
      <div style="padding-top: 0; padding-bottom: 90px;">
        <div style="width:728px;height:90px;position:fixed;text-align:center;font-size:0;bottom:0;left:0;right:0;margin:auto">
          <label for="aadsstickymojbiylo" style="top: -24px; right: 0;; position: absolute;border-radius: 4px; background: rgba(15, 23, 42, 0.9); padding: 4px;z-index: 99999;cursor:pointer; border: 1px solid rgba(59,130,246,0.3);">
            <svg fill="#ffffff" height="16px" width="16px" xmlns="http://w3.org" viewBox="0 0 490 490">
              <polygon points="456.851,0 245,212.564 33.149,0 0.708,32.337 212.669,245.004 0.708,457.678 33.149,490 245,277.443 456.851,490 489.292,457.678 277.331,245.004 489.292,32.337 "/>
            </svg>
          </label>
          <div id="frame" style="width: 728px;margin: auto;z-index: 99998;height: auto">
                          <div style="width: 728px;margin:auto;text-align:left;position: absolute;left: 0;right: 0; top:-24px">
                            <a style="display:inline-block;font-size: 11px;color: #3b82f6;padding: 4px 10px;background: #0a0f1e;text-decoration: none; border-radius: 4px 4px 0 0; border: 1px solid rgba(59,130,246,0.3); border-bottom: 0;"
                              id="frame-link"
                              target="_blank"
                              href="https://aads.com">
                              Advertise here
                            </a>
                          </div>
                        <iframe data-aa=2435906 src=//://a-ads.com style='border:0; padding:0; width:728px; height:90px; overflow:hidden; margin: auto'></iframe>
                    </div>
        </div>
        <style> #aadsstickymojbiylo:checked + div { display: none; } </style>
      </div>
    </div>

    <script>
        const API_KEY = "AIzaSyA_HZDWye5mSLBvgvrjbkBIoAbzJAt6rzo"; // <--- HIER DEN GOOGLE KEY REIN
        let seconds = 30;
        let selectedBase64 = null;
        let shares = parseInt(localStorage.getItem('user_shares')) || 0;

        window.onload = () => {
            updatePremiumStatus();
            document.getElementById('share-val').innerText = shares >= 3 ? 3 : shares;
            startTimer();
        };

        function startTimer() {
            const countdown = setInterval(() => {
                if(seconds > 0) {
                    seconds--;
                    document.getElementById('timer-text').innerText = `Locked: ${seconds}s`;
                } else {
                    clearInterval(countdown);
                    document.getElementById('user-msg').disabled = false;
                    document.getElementById('user-msg').placeholder = "Daten übermitteln...";
                    document.getElementById('send-btn').disabled = false;
                    document.getElementById('timer-text').innerText = "System Online ✓";
                }
            }, 1000);
        }

        function shareForPremium() {
            const url = window.location.origin + window.location.pathname;
            navigator.clipboard.writeText(url);
            shares++;
            localStorage.setItem('user_shares', shares);
            document.getElementById('share-val').innerText = shares >= 3 ? 3 : shares;

            if(shares >= 3) {
                const expiry = new Date();
                expiry.setDate(expiry.getDate() + 3);
                localStorage.setItem('prem_exp', expiry.toISOString());
                alert("PREMIUM AKTIVIERT! 3 Tage keine Werbung & kein Warten mehr! 🔥");
                location.reload();
            } else {
                alert(`Link kopiert! Noch ${3 - shares}x teilen für Premium.`);
            }
        }

        function updatePremiumStatus() {
            const prem = localStorage.getItem('prem_exp');
            if(prem && new Date(prem) > new Date()) {
                seconds = 0;
                document.getElementById('status-tag').innerText = "PRO ACCESS";
                document.getElementById('status-tag').className = "px-3 py-1 rounded bg-green-500/10 text-green-400 border border-green-500/20 text-[10px] font-black uppercase";
                // Versteckt die Werbung im Premium Modus
                document.querySelector('[style*="z-index: 99999"]').style.display = 'none';
            }
        }

        function previewImg() {
            const file = document.getElementById('img-in').files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                selectedBase64 = reader.result.split(',')[1];
                document.getElementById('clip-icon').innerText = "✓";
                document.getElementById('clip-icon').classList.replace('text-blue-500', 'text-green-500');
            };
            reader.readAsDataURL(file);
        }

        async function handleAction() {
            const msg = document.getElementById('user-msg').value;
            if(!msg && !selectedBase64) return;
            addChat("User", msg || "Analysiere Bild-Daten...");
            document.getElementById('user-msg').value = "";
            const bId = "bot-" + Date.now();
            addChat("Bot", "KI analysiert...", bId);

            if(msg.toLowerCase().includes("referat") || msg.toLowerCase().includes("powerpoint")) {
                generatePPT(msg, bId);
            } else {
                callGemini(msg, bId);
            }
        }

        async function callGemini(text, bId) {
            try {
                let parts = [{ text: "Du bist ein Schul-Profi. Antworte ausführlich auf Deutsch: " + text }];
                if(selectedBase64) parts.push({ inline_data: { mime_type: "image/jpeg", data: selectedBase64 } });

                const res = await fetch(`https://googleapis.com{API_KEY}`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ contents: [{ parts }] })
                });
                const d = await res.json();
                document.getElementById(bId).innerText = d.candidates[0].content.parts[0].text;
                selectedBase64 = null;
                document.getElementById('clip-icon').innerText = "+";
            } catch (e) { document.getElementById(bId).innerText = "FEHLER: Check deinen API Key!"; }
        }

        function generatePPT(topic, bId) {
            let pptx = new PptxGenJS();
            const slides = ["Einleitung", "Zusammenfassung", "Wichtige Fakten", "Analyse", "Fazit"];
            slides.forEach(s => {
                let slide = pptx.addSlide();
                slide.background = { fill: "02040a" };
                slide.addText(topic.toUpperCase(), { x: 0.5, y: 0.5, color: "3b82f6", fontSize: 24, bold: true });
                slide.addText(s, { x: 0.5, y: 1.2, color: "ffffff", fontSize: 18 });
            });
            pptx.writeFile({ fileName: `Referat.pptx` });
            document.getElementById(bId).innerText = "✅ 5 Folien wurden erstellt und heruntergeladen!";
        }

        function addChat(role, text, id = "") {
            const div = document.createElement('div');
            div.className = `flex ${role === 'User' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div id="${id}" class="${role === 'User' ? 'bg-blue-600 shadow-blue-500/20' : 'glass ai-bubble'} p-4 rounded-2xl ${role === 'User' ? 'rounded-tr-none' : 'rounded-tl-none'} max-w-[85%] text-sm leading-relaxed">${text}</div>`;
            document.getElementById('chat-container').appendChild(div);
            document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
        }
    </script>
</body>
</html>
