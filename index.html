<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI STUDY | Anonymes Hausaufgaben-System</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05070a; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .ai-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        .loading-bar { width: 0%; height: 2px; background: #3b82f6; transition: width 0.3s; position: absolute; top: 0; left: 0; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- A-ADS STICKY UNIT -->
    <div id="ad-wrapper" style="position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999; display: flex; justify-content: center;">
        <input autocomplete="off" type="checkbox" id="aadsstickymojbiylo" hidden />
        <div style="padding-bottom: 90px; width: 728px; position: relative;">
            <div style="width:728px;height:90px;text-align:center;font-size:0;margin:auto">
                <label for="aadsstickymojbiylo" style="top: -24px; right: 0; position: absolute; border-radius: 4px; background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.1); padding: 4px; z-index: 99999; cursor:pointer">
                    <svg fill="#ffffff" height="16px" width="16px" viewBox="0 0 490 490"><polygon points="456.851,0 245,212.564 33.149,0 0.708,32.337 212.669,245.004 0.708,457.678 33.149,490 245,277.443 456.851,490 489.292,457.678 277.331,245.004 489.292,32.337 "/></svg>
                </label>
                <div id="frame" style="width: 728px; margin: auto; z-index: 99998; height: auto">
                    <iframe data-aa=2435906 src=//://a-ads.com style='border:0; padding:0; width:728px; height:90px; overflow:hidden; margin: auto'></iframe>
                </div>
            </div>
        </div>
        <style> #aadsstickymojbiylo:checked + div { display: none; } </style>
    </div>

    <!-- Header -->
    <nav class="p-5 flex justify-between items-center glass sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-extrabold text-white ai-glow">Σ</div>
            <div>
                <h1 class="font-bold text-lg tracking-tight">AI<span class="text-blue-500 text-sm italic">STUDY</span></h1>
                <p class="text-[9px] text-gray-500 font-semibold uppercase tracking-[0.2em]">Next-Gen Learning</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="shareLink()" class="hidden md:block text-xs bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg transition border border-gray-700">Teilen für Premium</button>
            <div id="user-status" class="px-3 py-2 rounded-lg text-[10px] font-bold uppercase bg-red-500/10 text-red-500 border border-red-500/20">Free Mode</div>
        </div>
    </nav>

    <!-- Chat -->
    <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6 max-w-4xl mx-auto w-full pb-32">
        <div class="flex flex-col gap-2 animate-pulse">
            <div class="glass p-5 rounded-2xl rounded-tl-none max-w-[90%] shadow-2xl">
                <p class="text-sm leading-relaxed text-gray-300">System bereit. Senden Sie mir ein Foto oder eine Frage. <br><br><span class="text-blue-400 font-bold">Tipp:</span> Schreiben Sie "PowerPoint zu [Thema]", um Folien zu generieren.</p>
            </div>
        </div>
    </div>

    <!-- Input -->
    <div class="fixed bottom-[110px] left-0 right-0 p-4 z-40">
        <div class="max-w-3xl mx-auto glass rounded-2xl p-2 ai-glow relative">
            <div id="loader" class="loading-bar"></div>
            <div class="flex items-center gap-2">
                <label class="w-12 h-12 flex items-center justify-center bg-gray-800 rounded-xl cursor-pointer hover:bg-gray-700 transition">
                    <span class="text-xl text-blue-400">+</span>
                    <input type="file" id="img-in" class="hidden" accept="image/*">
                </label>
                <input type="text" id="user-msg" placeholder="Warte auf Timer..." disabled
                    class="flex-1 bg-transparent border-none px-3 py-2 outline-none text-sm disabled:text-gray-600">
                <button id="send-btn" onclick="handleAction()" disabled
                    class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center disabled:opacity-30 disabled:grayscale transition shadow-lg shadow-blue-900/40">
                    <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
        <p id="timer-text" class="text-center text-[10px] text-gray-500 mt-2 font-bold uppercase tracking-widest">Werbung wird verarbeitet: 30s</p>
    </div>

    <script>
        const API_KEY = "DEIN_GEMINI_API_KEY"; // HIER DEIN KEY REIN
        let seconds = 30;
        let isPremium = false;

        window.onload = () => {
            checkPremium();
            startTimer();
        };

        function checkPremium() {
            const prem = localStorage.getItem('study_premium');
            if (prem && new Date(prem) > new Date()) {
                isPremium = true;
                document.getElementById('user-status').innerText = 'Premium Mode';
                document.getElementById('user-status').className = 'px-3 py-2 rounded-lg text-[10px] font-bold uppercase bg-green-500/10 text-green-400 border border-green-500/20';
                document.getElementById('ad-wrapper').style.display = 'none';
                seconds = 0;
            }
        }

        function startTimer() {
            if(isPremium) { finishTimer(); return; }
            const tText = document.getElementById('timer-text');
            const interval = setInterval(() => {
                seconds--;
                tText.innerText = `Werbung wird verarbeitet: ${seconds}s`;
                if(seconds <= 0) {
                    clearInterval(interval);
                    finishTimer();
                }
            }, 1000);
        }

        function finishTimer() {
            document.getElementById('user-msg').disabled = false;
            document.getElementById('user-msg').placeholder = "Frage oder PPT Thema...";
            document.getElementById('send-btn').disabled = false;
            document.getElementById('timer-text').innerText = "System Bereit ✓";
        }

        async function handleAction() {
            const msg = document.getElementById('user-msg').value;
            if(!msg) return;

            addChat("User", msg);
            document.getElementById('user-msg').value = "";

            if(msg.toLowerCase().includes("powerpoint") || msg.toLowerCase().includes("ppt")) {
                generatePPT(msg);
            } else {
                callGemini(msg);
            }
        }

        async function callGemini(text) {
            addChat("Bot", "KI analysiert... (API Key erforderlich)");
            // Hier kommt der Fetch-Code zur Google API rein
        }

        function generatePPT(topic) {
            let pptx = new PptxGenJS();
            let slide = pptx.addSlide();
            slide.background = { fill: "0f172a" };
            slide.addText(topic.toUpperCase(), { x: 0.5, y: 1, w: "90%", fontSize: 36, color: "3b82f6", bold: true, align: 'center' });
            slide.addText("Erstellt durch AI STUDY Systems", { x: 0.5, y: 3, w: "90%", fontSize: 14, color: "94a3b8", align: 'center' });
            pptx.writeFile({ fileName: `Referat_${topic}.pptx` });
            addChat("Bot", "✅ Deine PowerPoint wurde generiert und heruntergeladen.");
        }

        function addChat(role, text) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `flex flex-col ${role === 'User' ? 'items-end' : 'items-start'}`;
            div.innerHTML = `<div class="${role === 'User' ? 'bg-blue-600' : 'glass'} p-4 rounded-2xl ${role === 'User' ? 'rounded-tr-none' : 'rounded-tl-none'} max-w-[85%] text-sm shadow-xl">${text}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function shareLink() {
            const url = window.location.origin + window.location.pathname + "?ref=" + Math.random().toString(36).substring(7);
            navigator.clipboard.writeText(url);
            alert("Empfehlungs-Link kopiert! 1 Klick auf den Link schaltet Premium für 3 Tage frei.");
        }

        // Ref-Check für Premium
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.has('ref')) {
            const exp = new Date();
            exp.setDate(exp.getDate() + 3);
            localStorage.setItem('study_premium', exp.toISOString());
            window.location.href = window.location.pathname;
        }
    </script>
</body>
</html>
