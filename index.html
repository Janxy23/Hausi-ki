<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymer Hausaufgaben-Bot</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        .chat-gradient { background: linear-gradient(135deg, #1f2937 0%, #111827 100%); }
    </style>
</head>
<body class="chat-gradient text-white min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-900/50 backdrop-blur-md sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-bold tracking-tight">AI <span class="text-blue-500">STUDY</span></h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest">Anonymes Lern-System</p>
        </div>
        <div id="status-badge" class="px-3 py-1 rounded-full text-xs font-medium bg-gray-800 border border-gray-700">
            Status: <span id="user-status" class="text-red-400">Free</span>
        </div>
    </div>

    <!-- Werbe-Bereich -->
    <div id="ad-area" class="w-full flex justify-center py-2 bg-black/20 border-b border-gray-800">
        <!-- A-ADS CODE HIER -->
        <div class="text-[10px] text-gray-600">WERBUNG (A-ADS)</div>
    </div>

    <!-- Chat Verlauf -->
    <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6">
        <div class="flex flex-col space-y-2">
            <div class="bg-gray-800 border border-gray-700 p-4 rounded-2xl rounded-tl-none max-w-[85%] shadow-xl">
                <p class="text-sm">Willkommen. Ich löse deine Hausaufgaben anonym.</p>
                <div class="mt-3 flex gap-2">
                    <button onclick="shareLink()" class="text-[10px] bg-blue-600/20 text-blue-400 border border-blue-600/30 px-2 py-1 rounded hover:bg-blue-600/40 transition">Teilen für 3 Tage Premium</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Steuerung -->
    <div class="p-4 bg-gray-900/80 backdrop-blur-lg border-t border-gray-800">
        <div class="max-w-4xl mx-auto">
            <div id="preview-container" class="hidden mb-2 p-2 bg-gray-800 rounded-lg border border-blue-500/50">
                <p class="text-xs text-blue-400">Bild ausgewählt ✓</p>
            </div>
            
            <div class="flex items-center gap-2">
                <label class="group relative flex items-center justify-center w-12 h-12 bg-gray-800 border border-gray-700 rounded-xl cursor-pointer hover:border-blue-500 transition-all">
                    <span class="text-xl group-hover:scale-110 transition-transform">+</span>
                    <input type="file" id="image-input" class="hidden" accept="image/*" onchange="showPreview()">
                </label>
                
                <input type="text" id="user-msg" placeholder="Hausaufgabe eintippen..." 
                    class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 h-12 outline-none focus:border-blue-500 transition-all text-sm">
                
                <button onclick="processAction()" class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center hover:bg-blue-500 shadow-lg shadow-blue-900/20">
                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
            <p class="text-[9px] text-center text-gray-500 mt-3">Anonymes System. Keine Daten werden auf Servern gespeichert.</p>
        </div>
    </div>

    <script>
        const API_KEY = "DEIN_GOOGLE_API_KEY"; // Hier den Gemini Key rein

        // Initialisierung
        window.onload = () => {
            updateUI();
            checkRef();
        };

        function updateUI() {
            const premium = localStorage.getItem('premium_active');
            if (premium) {
                document.getElementById('ad-area').style.display = 'none';
                document.getElementById('user-status').innerText = 'Premium';
                document.getElementById('user-status').className = 'text-green-400';
            }
        }

        // Referral System (Teilen)
        function shareLink() {
            const refId = Math.random().toString(36).substring(7);
            const link = window.location.href.split('?')[0] + "?ref=" + refId;
            navigator.clipboard.writeText(link);
            alert("Link kopiert! Wenn 3 Leute diesen Link öffnen, kriegst du 3 Tage Premium.\n(Simuliert: In dieser Version reicht 1 Klick für den Test)");
        }

        function checkRef() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('ref')) {
                // In einer echten DB würdest du zählen. 
                // Hier schalten wir es für den Test direkt frei:
                const expiry = new Date();
                expiry.setDate(expiry.getDate() + 3);
                localStorage.setItem('premium_active', expiry.toISOString());
                window.history.replaceState({}, document.title, "/");
                updateUI();
            }
        }

        function showPreview() {
            document.getElementById('preview-container').classList.remove('hidden');
        }

        async function processAction() {
            const input = document.getElementById('user-msg').value;
            const file = document.getElementById('image-input').files[0];
            
            if(!input && !file) return;

            addMsg("Du", input || "Bild gesendet");
            
            // Logik für PowerPoint Erstellung
            if(input.toLowerCase().includes("powerpoint") || input.toLowerCase().includes("ppt")) {
                generatePPT(input);
            } else {
                // Hier käme der Fetch zur Google API für Hausaufgaben
                addMsg("Bot", "Ich analysiere das... (API-Anbindung erforderlich)");
            }
        }

        function addMsg(sender, text) {
            const div = document.createElement('div');
            div.className = "flex flex-col space-y-1 items-" + (sender === "Du" ? "end" : "start");
            div.innerHTML = `<div class="${sender === "Du" ? "bg-blue-600" : "bg-gray-800 border border-gray-700"} p-3 rounded-2xl max-w-[85%] text-sm">${text}</div>`;
            document.getElementById('chat-container').appendChild(div);
            document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
        }

        function generatePPT(topic) {
            let pptx = new PptxGenJS();
            let slide = pptx.addSlide();
            slide.background = { fill: "111827" };
            slide.addText(topic.toUpperCase(), { x: 0.5, y: 1, w: "90%", fontSize: 32, color: "3B82F6", align: "center", bold: true });
            slide.addText("Erstellt mit der anonymen Schul-KI", { x: 0.5, y: 3, w: "90%", fontSize: 14, color: "FFFFFF", align: "center" });
            
            pptx.writeFile({ fileName: `Referat_${topic}.pptx` });
            addMsg("Bot", "✅ Deine PowerPoint wurde erstellt und heruntergeladen!");
        }
    </script>
</body>
</html>
